<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#110f23" />
    <meta name="description" content="Alex AI - Voice-Based Technical Interview Agent" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#311ff9",
              "background-light": "#f6f5f8",
              "background-dark": "#110f23",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>

    <style>
      .glass {
          background: rgba(49, 31, 249, 0.05);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .waveform-bar {
          animation: pulse-height 1.5s ease-in-out infinite;
      }
      @keyframes pulse-height {
          0%, 100% { height: 10px; }
          50% { height: 40px; }
      }
      .card-interactive {
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-interactive:hover {
          transform: translateY(-8px);
          box-shadow: 0 20px 40px -15px rgba(49, 31, 249, 0.3);
          border-color: rgba(49, 31, 249, 0.6) !important;
      }
    </style>

    <title>Alex AI | Technical Interviews</title>
  </head>
  <body class="bg-background-dark text-slate-100 antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
